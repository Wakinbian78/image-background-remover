<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图片去背景工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-6">

  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-800 mb-2">🖼️ 图片去背景</h1>
    <p class="text-gray-500 text-sm mb-6">上传图片，自动去除背景，下载透明 PNG</p>

    <!-- 上传区域 -->
    <label id="drop-zone"
      class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-colors">
      <svg class="w-10 h-10 text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
      </svg>
      <span class="text-gray-500 text-sm">点击或拖拽图片到此处</span>
      <span class="text-gray-400 text-xs mt-1">支持 JPG、PNG、WEBP</span>
      <input id="file-input" type="file" accept="image/*" class="hidden" />
    </label>

    <!-- 预览区域 -->
    <div id="preview-section" class="hidden mt-6">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <p class="text-xs text-gray-500 mb-1 font-medium">原图</p>
          <img id="preview-original" class="rounded-lg w-full object-contain max-h-48 bg-gray-100" />
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-1 font-medium">去背景结果</p>
          <div id="result-placeholder"
            class="rounded-lg w-full h-48 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PHJlY3Qgd2lkdGg9IjEwIiBoZWlnaHQ9IjEwIiBmaWxsPSIjZTVlN2ViIi8+PHJlY3QgeD0iMTAiIHk9IjEwIiB3aWR0aD0iMTAiIGhlaWdodD0iMTAiIGZpbGw9IiNlNWU3ZWIiLz48cmVjdCB4PSIxMCIgd2lkdGg9IjEwIiBoZWlnaHQ9IjEwIiBmaWxsPSIjZjlmYWZiIi8+PHJlY3QgeT0iMTAiIHdpZHRoPSIxMCIgaGVpZ2h0PSIxMCIgZmlsbD0iI2Y5ZmFmYiIvPjwvc3ZnPg==')] flex items-center justify-center">
            <img id="preview-result" class="hidden rounded-lg w-full object-contain max-h-48" />
            <span id="result-loading" class="hidden text-sm text-gray-500">处理中...</span>
          </div>
        </div>
      </div>

      <div class="flex gap-3 mt-4">
        <button id="btn-process"
          class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-4 rounded-lg transition-colors">
          开始去背景
        </button>
        <button id="btn-download"
          class="hidden flex-1 bg-green-500 hover:bg-green-600 text-white font-medium py-2 px-4 rounded-lg transition-colors">
          下载结果
        </button>
      </div>
    </div>

    <!-- 错误提示 -->
    <div id="error-msg" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm"></div>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const previewSection = document.getElementById('preview-section');
    const previewOriginal = document.getElementById('preview-original');
    const previewResult = document.getElementById('preview-result');
    const resultLoading = document.getElementById('result-loading');
    const btnProcess = document.getElementById('btn-process');
    const btnDownload = document.getElementById('btn-download');
    const errorMsg = document.getElementById('error-msg');

    let selectedFile = null;
    let resultBlob = null;

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('border-blue-400', 'bg-blue-50'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-blue-400', 'bg-blue-50'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('border-blue-400', 'bg-blue-50');
      handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      selectedFile = file;
      previewOriginal.src = URL.createObjectURL(file);
      previewSection.classList.remove('hidden');
      previewResult.classList.add('hidden');
      btnDownload.classList.add('hidden');
      errorMsg.classList.add('hidden');
      resultBlob = null;
    }

    btnProcess.addEventListener('click', async () => {
      if (!selectedFile) return;
      btnProcess.disabled = true;
      btnProcess.textContent = '处理中...';
      resultLoading.classList.remove('hidden');
      previewResult.classList.add('hidden');
      errorMsg.classList.add('hidden');

      try {
        const formData = new FormData();
        formData.append('file', selectedFile);
        const res = await fetch('/remove-bg', { method: 'POST', body: formData });
        if (!res.ok) throw new Error((await res.json()).detail || '处理失败');
        resultBlob = await res.blob();
        previewResult.src = URL.createObjectURL(resultBlob);
        previewResult.classList.remove('hidden');
        btnDownload.classList.remove('hidden');
      } catch (err) {
        errorMsg.textContent = '错误：' + err.message;
        errorMsg.classList.remove('hidden');
      } finally {
        resultLoading.classList.add('hidden');
        btnProcess.disabled = false;
        btnProcess.textContent = '开始去背景';
      }
    });

    btnDownload.addEventListener('click', () => {
      if (!resultBlob) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(resultBlob);
      a.download = 'removed_bg.png';
      a.click();
    });
  </script>
</body>
</html>
